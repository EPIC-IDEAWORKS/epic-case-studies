<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Project Title] — EPIC Case Study</title>
  <link rel="stylesheet" href="../../assets/epic-theme.css">
  <style>
    /* ── Site chrome ─────────────────────────────────────────── */
    .site-header {
      background: var(--epic-charcoal);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .site-header__brand {
      color: var(--epic-white);
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .site-header__brand span {
      color: var(--epic-orange);
    }

    .site-header__back {
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      text-decoration: none;
    }

    .site-header__back:hover {
      color: var(--epic-white);
    }

    /* ── Link bar ────────────────────────────────────────────── */
    .link-bar {
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      padding: 0.6rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      align-items: center;
    }

    .link-bar__label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: bold;
    }

    .link-bar__link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      font-weight: bold;
      color: var(--epic-accent);
      text-decoration: none;
      border: 1px solid var(--epic-accent);
      padding: 0.25rem 0.65rem;
      border-radius: 2px;
    }

    .link-bar__link:hover {
      background: var(--epic-accent);
      color: var(--epic-white);
    }

    .link-bar__link--tool {
      color: var(--epic-accent-soft);
      border-color: var(--epic-accent-soft);
    }

    .link-bar__link--tool:hover {
      background: var(--epic-accent-soft);
      color: var(--epic-white);
    }

    /* ── Card stack ──────────────────────────────────────────── */
    .card-stack {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Site footer ─────────────────────────────────────────── */
    .site-footer {
      background: var(--epic-charcoal);
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .site-footer a {
      color: var(--epic-orange);
      text-decoration: none;
    }

    .site-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
