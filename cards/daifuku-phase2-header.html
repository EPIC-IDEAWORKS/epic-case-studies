<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daifuku — Phase 2 Header</title>
  <link rel="stylesheet" href="../assets/epic-theme.css">
  <style>
    .card {
      background: var(--epic-accent-soft);
      border-left: none;
      padding: 1rem 1.75rem;

    .card__phase {
      font-size: 1.1rem;

      margin-bottom: 0.25rem;
    }

    .card__date-range {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);

</head>
<body>
  <div class="card">
    <div class="card__phase">Phase 2: Shop Management Software, Production Analytics &amp; Cobot Integration</div>
