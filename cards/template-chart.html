<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Project Title] — Chart</title>
  <link rel="stylesheet" href="../assets/epic-theme.css">
  <style>
    .card__chart-area {
      width: 100%;
      min-height: 260px;
      background: #f8f8f8;
      border: 1px dashed #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.75rem 0;
      color: #999;
      font-size: 0.85rem;
      font-style: italic;
    }

    .card__caption {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__label">[Chart title / metric name]</div>
    <!-- Replace .card__chart-area with an <img>, <svg>, or chart library embed -->
    <div class="card__chart-area">[Chart goes here]</div>
    <p class="card__caption">[Source, methodology note, or date range for the data shown]</p>
    <div class="card__divider"></div>
  </div>
</body>
</html>
