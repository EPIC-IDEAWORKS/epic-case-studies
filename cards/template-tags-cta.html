<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Project Title] — Tags &amp; Contact</title>
  <link rel="stylesheet" href="../assets/epic-theme.css">
  <style>
    .card {
      border-left-color: var(--epic-orange);
    }

    .card__tags {
      margin-bottom: 1.25rem;
      line-height: 2;
    }

    .card__cta-heading {
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--epic-charcoal);
      margin-bottom: 0.35rem;
    }

    .card__contact {
      font-size: 0.9rem;
    }

    .card__contact a {
      color: var(--epic-accent);
      text-decoration: none;
      font-weight: bold;
    }

    .card__contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__label">Tags</div>
    <div class="card__tags">
      <span class="card__tag">[Tag 1]</span>
      <span class="card__tag">[Tag 2]</span>
      <span class="card__tag">[Tag 3]</span>
      <span class="card__tag">[Tag 4]</span>
      <!-- Add or remove tags as needed -->
    </div>

    <p class="card__cta-heading">[Contextual CTA question, e.g. "Is your facility ready for Industry 4.0?"]</p>
    <p class="card__contact">
      EPIC can help. Contact us at
      <a href="mailto:epic@mohawkcollege.ca">epic@mohawkcollege.ca</a>
    </p>
  </div>
</body>
</html>
